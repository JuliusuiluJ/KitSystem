# Configuration du menu GUI
gui:
  title: "<dark_gray>Choix de Kit</dark_gray>"
  size: 27

# Liste des kits
kits:
  guerrier:
    display-name: "<gradient:#ff0000:#aa0000><bold>Kit Guerrier</bold></gradient>"
    permission: "kitsystem.kit.guerrier"
    cooldown: 20 # Temps en secondes
    gui-icon:
      material: DIAMOND_SWORD
      name: "<red>Guerrier</red>"
      lore:
        - "<gray>Un kit parfait pour le combat au corps à corps.</gray>"
        - ""
        - "<yellow>Cooldown : <cooldown_format></yellow>"
        - "<action_format>"
    items:
      - material: DIAMOND_SWORD
        amount: 1
      - material: GOLDEN_APPLE
        amount: 16
      - material: COOKED_BEEF
        amount: 64

  mineur:
    display-name: "<gradient:#aaaaaa:#555555><bold>Kit Mineur</bold></gradient>"
    permission: "kitsystem.kit.mineur"
    cooldown: 60 # 1 minute
    gui-icon:
      material: IRON_PICKAXE
      name: "<gray>Mineur</gray>"
      lore:
        - "<gray>L'équipement parfait pour explorer les grottes.</gray>"
        - ""
        - "<yellow>Cooldown : <cooldown_format></yellow>"
        - "<action_format>"
